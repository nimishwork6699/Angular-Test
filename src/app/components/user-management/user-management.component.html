<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>User Management</h2>
    <button class="btn btn-success" (click)="openAddForm()" *ngIf="!showForm">Add New User</button>
  </div>

  <div class="card shadow-sm mb-4" *ngIf="showForm">
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
      <h5 class="mb-0">{{ isEditMode ? 'Edit User' : 'Add New User' }}</h5>
      <span *ngIf="isLoadingData" class="badge bg-warning text-dark"><i class="bi bi-arrow-repeat"></i> Fetching random data...</span>
    </div>
    <div class="card-body">
      <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" formControlName="userName" placeholder="Username" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" formControlName="password" placeholder="Password" />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" formControlName="firstName" placeholder="First Name" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" formControlName="lastName" placeholder="Last Name" />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" formControlName="email" placeholder="Email" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Phone Number</label>
            <input type="text" class="form-control" formControlName="phoneNumber" placeholder="Phone Number" />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Country</label>
            <input type="text" class="form-control" formControlName="country" placeholder="Country" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Address</label>
            <input type="text" class="form-control" formControlName="address" placeholder="Address" />
          </div>
        </div>

        <div class="d-flex justify-content-end">
          <button type="button" class="btn btn-secondary me-2" (click)="cancelForm()">Cancel</button>
          <button type="submit" class="btn btn-primary" [disabled]="userForm.invalid">
            {{ isEditMode ? 'Save Changes' : 'Create User' }}
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="table-responsive shadow-sm rounded" *ngIf="!showForm">
    <table class="table table-bordered table-striped table-hover mb-0">
      <thead class="table-dark">
        <tr>
          <th>User Name</th>
          <th>First Name</th>
          <th>Last Name</th>
          <th>Email</th>
          <th>Phone Number</th>
          <th>Country</th>
          <th class="text-center">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users">
          <td>{{ user.userName }}</td>
          <td>{{ user.firstName }}</td>
          <td>{{ user.lastName }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.phoneNumber }}</td>
          <td>{{ user.country }}</td>
          <td class="text-center">
            <button class="btn btn-primary btn-sm me-2" (click)="editUser(user)">Edit</button>
            <button class="btn btn-danger btn-sm" (click)="deleteUser(user.userId)">Delete</button>
          </td>
        </tr>
        <tr *ngIf="users.length === 0">
          <td colspan="7" class="text-center py-4">
            <p class="text-muted mb-0">No users found.</p>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
